[env]
# CRITICAL FIX: Points to the native Windows LLVM installation containing clang.dll
LIBCLANG_PATH = "C:/Program Files/LLVM/bin"

# Forces bindgen to calculate alignments matching the API 24 target using the Windows DLL
BINDGEN_EXTRA_CLANG_ARGS = "--target=armv7-linux-androideabi24 --sysroot=%localappdata%/Android/Sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/windows-x86_64/sysroot"

[target.armv7-linux-androideabi]
# Aligns perfectly with Tauri's internal API Level 24 command loop
linker = "%localappdata%/Android/Sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/windows-x86_64/bin/armv7a-linux-androideabi24-clang.cmd"
ar = "%localappdata%/Android/Sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/windows-x86_64/bin/llvm-ar.exe"

[target.aarch64-linux-android]
# Fallback for modern 64-bit devices matching the same API level
linker = "%localappdata%/Android/Sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/windows-x86_64/bin/aarch64-linux-android24-clang.cmd"
ar = "%localappdata%/Android/Sdk/ndk/27.2.12479018/toolchains/llvm/prebuilt/windows-x86_64/bin/llvm-ar.exe"